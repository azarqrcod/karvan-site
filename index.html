<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KARVAN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0d0d0d;
color:white;
}

.navbar{
position:fixed;
top:0;
width:100%;
padding:25px 60px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.logo{
font-size:28px;
font-weight:bold;
}

.navbar ul{
display:flex;
gap:30px;
list-style:none;
}

.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1600&auto=format&fit=crop') center/cover;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:relative;
text-align:center;
}

.hero h1{
font-size:70px;
line-height:1.2;
margin-bottom:20px;
}

button{
padding:15px 35px;
border:none;
background:#ff7a00;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">KARVAN</div>

<ul>
<li>Home</li>
<li>Projects</li>
<li>Services</li>
<li>Contact</li>
</ul>

</nav>

<section class="hero">

<div class="overlay"></div>

<div class="hero-content">

<h1>
Designing Spaces<br>
That Feel Timeless.
</h1>

<button>View Projects</button>

</div>

</section>

</body>
</html>
