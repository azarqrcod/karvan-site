<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KARVAN Interior Design</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0d0d0d;
color:white;
overflow-x:hidden;
}

.navbar{
position:fixed;
top:0;
width:100%;
padding:25px 60px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.logo img{
height:60px;
}

.navbar ul{
display:flex;
gap:30px;
list-style:none;
}

.navbar li{
cursor:pointer;
transition:0.3s;
}

.navbar li:hover{
color:#ff7a00;
}

.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1484154218962-a197022b5858?q=80&w=1600&auto=format&fit=crop') center/cover;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

.hero-content{
position:relative;
text-align:center;
padding:20px;
}

.hero h1{
font-size:clamp(42px,8vw,90px);
line-height:1.1;
margin-bottom:25px;
font-weight:bold;
}

button{
padding:15px 35px;
border:none;
background:#ff7a00;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

@media(max-width:768px){

.navbar{
padding:20px;
flex-direction:column;
gap:15px;
}

.logo img{
height:50px;
}

.navbar ul{
gap:15px;
font-size:14px;
}

.hero h1{
font-size:52px;
}

button{
padding:12px 25px;
font-size:16px;
}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">
<img src="logo.png" alt="KARVAN">
</div>

<ul>
<li>Home</li>
<li>Projects</li>
<li>Services</li>
<li>Contact</li>
</ul>

</nav>

<section class="hero">

<div class="overlay"></div>

<div class="hero-content">

<h1>
Luxury Interior<br>
Designed To Inspire.
</h1>

<button>
Explore Designs
</button>

</div>

</section>

</body>
</html>
